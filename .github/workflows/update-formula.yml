name: Update Formula

on:
  workflow_dispatch:
  schedule:
    - cron: "47 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Update formula
        run: ruby scripts/update_formula.rb
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit update
        run: |
          if git diff --quiet; then
            echo "Formula already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cliproxyapi-management-center.rb
          git commit -m "Update cliproxyapi-management-center formula"
          git push
